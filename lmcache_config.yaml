chunk_size: 256
local_cpu: True
local_disk: "/data/kvcache/"
max_local_cpu_size: 5 # GB
max_local_disk_size: 200   # GB


save_decode_cache: True
save_unfull_chunk: True

enable_controller: True
lmcache_instance_id: "lmcache_default_instance"
controller_pull_url: "host.docker.internal:8300"
controller_reply_url: "host.docker.internal:8400"
lmcache_worker_ports: 8001


